# Application
quarkus.application.name=BlockMock
quarkus.http.port=${BLOCKMOCK_PORT:8080}

# OpenAPI/Swagger Configuration
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
mp.openapi.extensions.smallrye.info.title=BlockMock API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=HTTP mock server for integration testing
mp.openapi.extensions.smallrye.info.contact.name=BlockMock Team
mp.openapi.extensions.smallrye.info.license.name=MIT

# Database (override with env vars BLOCKMOCK_DB_URL / BLOCKMOCK_DB_USER / BLOCKMOCK_DB_PASSWORD)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${BLOCKMOCK_DB_USER:blockmock}
quarkus.datasource.password=${BLOCKMOCK_DB_PASSWORD:blockmock}
quarkus.datasource.jdbc.url=${BLOCKMOCK_DB_URL:jdbc:postgresql://localhost:5432/blockmock}
quarkus.datasource.jdbc.max-size=16

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=no-file

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

# Web Resources
quarkus.http.enable-compression=true

# Logging
quarkus.log.level=INFO
quarkus.log.category."nl.blockmock".level=DEBUG
