name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build uber-jar
        run: mvn package -DskipTests -Dquarkus.package.type=uber-jar

      - name: Rename JAR
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv target/blockmock-*-runner.jar target/blockmock-${VERSION}.jar
          echo "JAR=target/blockmock-${VERSION}.jar" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: BlockMock ${{ github.ref_name }}
          body: |
            ## Getting Started

            **Prerequisites:** Java 21+, PostgreSQL 16 (or Docker)

            ### 1. Start PostgreSQL
            ```bash
            docker compose up -d postgres
            ```
            Download `docker-compose.yml` from the repository root, or use your own PostgreSQL instance.

            ### 2. Run BlockMock
            ```bash
            java -jar blockmock-${{ env.VERSION }}.jar
            ```
            Open **http://localhost:8080**

            ### Environment variables
            | Variable | Default | Description |
            |---|---|---|
            | `BLOCKMOCK_DB_URL` | `jdbc:postgresql://localhost:5432/blockmock` | JDBC URL |
            | `BLOCKMOCK_DB_USER` | `blockmock` | Database user |
            | `BLOCKMOCK_DB_PASSWORD` | `blockmock` | Database password |
            | `BLOCKMOCK_PORT` | `8080` | HTTP port |

            ### Demo setup (optional)
            ```bash
            # Set up the order-service demo (requires the order service to be running)
            bash demo/order-service/setup-blockmock.sh
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full documentation.
          files: ${{ env.JAR }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
